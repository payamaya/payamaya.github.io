    <section class="contact-section">
  <h1>Contact Me</h1>
  <p>Feel free to reach out via the form below, and I’ll get back to you soon.</p>

  <form method="POST" id="contact-form" class="contact-form">
    <input type="text" id="website" name="website" style="display:none" tabindex="-1" autocomplete="off" />
    <p id="status"></p>
    <p style="display:none;">
      <label>Don’t fill this out if you’re human:
        <input name="bot-field" />
      </label>
    </p>

    <div class="form-group">
      <label for="name">Your Name</label>
      <input type="text" id="name" name="name" required="" />
    </div>

    <div class="form-group">
      <label for="email">Your Email</label>
      <input type="email" id="email" name="email" required="" />
    </div>

    <div class="form-group">
      <label for="message">Message</label>
      <textarea id="message" name="message" rows="5" required=""></textarea>
    </div>

    <button type="submit" class="submit-btn">Send Message</button>
  </form>
</section>
<script>
  const form = document.getElementById("contact-form");
  const button = document.querySelector(".submit-btn");
  const status = document.getElementById("status");

  const CONFIG = {

    API_URL: "https://send-contact-email-794036390564.europe-north2.run.app",
    API_KEY: "8f3a9c1d7b2e4f6g8h0jPYsecureKey"
  };

  if (form) {
    form.addEventListener("submit", async function (e) {
      e.preventDefault();

      const website = document.getElementById('website').value;

      button.disabled = true;
      button.textContent = "Sending...";
      status.innerText = "Sending message...";

      const name = document.getElementById("name").value;
      const email = document.getElementById("email").value;
      const message = document.getElementById("message").value;

      const data = {
        name, email, message, website, apiKey: CONFIG.API_KEY
      };

      try {
        const res = await fetch(CONFIG.API_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(data)
        });

        const text = await res.text();

        if (res.ok) {
          status.innerText = "✅ Message sent successfully!";
          form.reset();
        } else {
          status.innerText = "❌ " + text;
        }
      } catch (err) {
        console.error(err);
        status.innerText = "❌ Error sending message";
      } finally {
        button.disabled = false;
        button.textContent = "Send Message";
      }
    });
  }
</script>
