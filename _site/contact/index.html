<script>
  (function () {
    const savedTheme = localStorage.getItem("theme");

    if (savedTheme === "dark") {
      document.documentElement.setAttribute("data-theme", "dark");
    } else if (!savedTheme && window.matchMedia("(prefers-color-scheme: dark)").matches) {
      document.documentElement.setAttribute("data-theme", "dark");
    }
  })();
</script>

  <main id="main-content">
    <section class="contact-section">
  <h1>Contact Me</h1>
  <p>Feel free to reach out via the form below, and I’ll get back to you soon.</p>

  <form method="POST" id="contact-form" class="contact-form">
    <input type="text" id="website" name="website" style="display:none" tabindex="-1" autocomplete="off" />
    <p id="status"></p>
    <input type="hidden" id="start-time" />

    <div class="form-group">
      <label for="name">Your Name</label>
      <input type="text" id="name" name="name" required="" />
    </div>

    <div class="form-group">
      <label for="email">Your Email</label>
      <input type="email" id="email" name="email" required="" />
    </div>

    <div class="form-group">
      <label for="message">Message</label>
      <textarea id="message" name="message" rows="5" required=""></textarea>
    </div>

    <button type="submit" class="submit-btn">Send Message</button>
  </form>
</section>
<script src="/assets/js/contact-email.js" defer=""></script>
