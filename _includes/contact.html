<section class="contact-section">
  <h1>Contact Me</h1>
  <p>Feel free to reach out via the form below, and I’ll get back to you soon.</p>

  <form method="POST" id="contact-form" class="contact-form">
    <p class="hidden">
      <label>Don’t fill this out if you’re human: <input name="bot-field" /></label>
    </p>

    <div class="form-group">
      <label for="name">Your Name</label>
      <input type="text" id="name" name="name" required />
    </div>

    <div class="form-group">
      <label for="email">Your Email</label>
      <input type="email" id="email" name="email" required />
    </div>

    <div class="form-group">
      <label for="message">Message</label>
      <textarea id="message" name="message" rows="5" required></textarea>
    </div>

    <button type="submit" class="submit-btn">Send Message</button>
  </form>
</section>
<script>
  const form = document.getElementById("contact-form");

  if (form) {
    form.addEventListener("submit", async function (e) {
      e.preventDefault();

      const data = {
        name: document.getElementById("name").value,
        email: document.getElementById("email").value,
        message: document.getElementById("message").value
      };

      try {
        const res = await fetch("https://send-contact-email-794036390564.europe-north2.run.app", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(data)
        });

        if (res.ok) {
          alert("✅ Message sent successfully!");
          form.reset();
        } else {
          alert("❌ Failed to send message");
        }
      } catch (err) {
        console.error(err);
        alert("❌ Error sending message");
      }
    });
  }
</script>
